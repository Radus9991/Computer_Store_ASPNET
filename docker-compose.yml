version: '3.8'

services:
  webapi:
    build:
      context: ./backend
      dockerfile: WebAPI/Dockerfile
    ports:
      - "5012:5012"
      - "80:80"
      - "5000:5000"
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Redis=
      - MongoDb__ConnectionString=mongodb://mongo:27017
      - MongoDb__DatabaseName=PcShop
      - Redis__ConnectionString=
      - PayPal__ClientId=
      - PayPal__ClientSecret=
      - Jwt__Key=
    depends_on:
      - mongo
      - redis
    restart: always

  emailworker:
    build:
      context: ./backend
      dockerfile: EmailWorker/Dockerfile
    environment:
      - REDIS_URL__ConnectionString=
      - MAILSENDER=
      - MAILPASSWORD=
      - MAILHOST=
      - MAILPORT=
    depends_on:
      - redis
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - webapi
    restart: always

  mongo:
    image: mongo:8
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    # ports:
    #   - "6379:6379"

volumes:
  mongo_data: