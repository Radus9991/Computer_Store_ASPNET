version: '3.8'

services:
  webapi:
    build:
      context: ./backend
      dockerfile: WebAPI/Dockerfile
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - MongoDb__ConnectionString=${MONGO_CONNECTION}
      - MongoDb__DatabaseName=PcShop
      - MongoDb__ComputersCollectionName=Computers
      - MongoDb__UsersCollectionName=Users
      - MongoDb__OrdersCollectionName=Orders
      - Jwt__Key=${JWT_KEY}
      - Jwt__Audience=serverapi.com
      - Jwt__Issuer=serverapi.com
      - Paypal__ClientId=${PAYPAL_CLIENT_ID}
      - Paypal__ClientSecret=${PAYPAL_SECRET}
      - ConnectionStrings__Redis=${REDIS_URL}
    depends_on:
      - mongo
      - redis
    restart: always

  emailworker:
    build:
      context: ./backend
      dockerfile: EmailWorker/Dockerfile
    environment:
      - Redis__Url=${REDIS_URL}
      - Mail__Sender=${MAIL_SENDER}
      - Mail__Password=${MAIL_PASSWORD}
      - Mail__Host=${MAIL_HOST}
      - Mail__Port=${MAIL_PORT}
    depends_on:
      - redis
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - webapi
    restart: always

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  mongo_data: