server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # SPA fallback – React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy do WebAPI (.NET) – REST
    location /api/ {
        proxy_pass         http://webapi:80/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Proxy do WebAPI – SignalR / WebSockets (jeśli używasz)
    location /orderHub/ {
        proxy_pass          http://webapi:80/orderHub/;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        proxy_read_timeout  3600s;
    }

    # Cache statycznych assetów React (JS, CSS, obrazy)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Nie cachuj index.html (SPA entry point)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Blokuj dostęp do ukrytych plików (.git, .env itp.)
    location ~ /\. {
        deny all;
        return 404;
    }

    error_page 404 /index.html;
}
